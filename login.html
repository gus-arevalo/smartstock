<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartStock – Login</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="big-icon">
          <svg viewBox="0 0 24 24" fill="white"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" stroke="rgba(255,255,255,0.4)" stroke-width="1" fill="none"/></svg>
        </div>
        <h1>SmartStock</h1>
        <p>Sistema de Estoque Inteligente</p>
      </div>
      <div class="login-form">
        <div class="form-group">
          <label>Usuário</label>
          <input type="text" placeholder="seu.usuario" value="gustavo"/>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" placeholder="••••••••" value="••••••••"/>
        </div>
        <button class="login-btn" onclick="window.location.href='index.html'">Entrar no sistema</button>
      </div>
      <div class="login-footer">SmartStock v1.0 · PIME 2026 · Belas Artes SP</div>
    </div>
  </div>
</body>
</html>
